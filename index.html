<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORLD 5050</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      overflow: hidden;

      /* Space/Nebula Background */
      background:
        radial-gradient(circle at 20% 30%, rgba(128, 0, 255, 0.5), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(0, 150, 255, 0.4), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.35), transparent 35%),
        radial-gradient(circle at 70% 60%, rgba(0, 255, 255, 0.25), transparent 30%),
        linear-gradient(to bottom, #050816, #0a0f2c, #140b29);

      background-size: cover;
      position: relative;
    }

    /* Stars */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 2px, transparent 2px);
      background-size: 100px 100px, 150px 150px, 200px 200px;
      background-position: 0 0, 40px 60px, 130px 270px;
      opacity: 0.6;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(255,255,255,0.8);
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 300;
      max-width: 800px;
      line-height: 1.5;
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }

      h2 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <h1>ORLD 5050</h1>
    <h2>Ethical Evidence-Based Decision-Making</h2>
  </div>
</body>
</html>
