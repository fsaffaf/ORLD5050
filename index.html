<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ORLD 5050: Ethical Evidence-Based Decision-Making</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 500px;
    width: 100%;
  }
  h1 {
    margin-bottom: 10px;
  }

  p {
    color: #666;
    font-style: italic;
    margin-bottom: 25px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .grid button:last-child {
    grid-column: span 2;
  }


  button {
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s;
  }


  button:hover {
    background: #5a67d8;
    transform: scale(1.05);
  }
</style>
</head>

<body>

<div class="container">
  <h1>ORLD 5050: Ethical Evidence-Based Decision-Making</h1>

  <p>Soft graphs, matrices, probability curves, and dashboards</p>

  <div class="grid">
    <button>Graphs</button>
    <button>Matrices</button>
    <button>Probability</button>
    <button>Dashboards</button>
    <button>Curves</button>
  </div>
</div>

</body>
