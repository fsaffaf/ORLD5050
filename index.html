<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORLD 5050</title>

  <!-- Easier-to-read modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;

      /* UPDATED FONT */
      font-family: 'Inter', sans-serif;

      background:
        radial-gradient(circle at top, rgba(0, 255, 200, 0.08), transparent 35%),
        linear-gradient(to bottom, #05070d 0%, #0b1220 45%, #020305 100%);

      color: white;
      position: relative;

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Background grid */
    .grid {
      position: absolute;
      inset: 0;

      background-image:
        linear-gradient(rgba(0, 255, 200, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 200, 0.05) 1px, transparent 1px);

      background-size: 60px 60px;
      z-index: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      height: 100vh;

      background: rgba(10, 18, 30, 0.9);
      border-right: 1px solid rgba(0,255,200,0.15);

      backdrop-filter: blur(8px);

      display: flex;
      flex-direction: column;
      align-items: center;

      padding-top: 40px;

      z-index: 2;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;

      /* reduced spacing for readability */
      letter-spacing: 2px;

      color: #d8ffff;

      margin-bottom: 50px;

      text-shadow:
        0 0 10px rgba(0,255,200,0.25);
    }

    /* Navigation buttons */
    .nav-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 0 25px;
    }

    .nav-buttons a {
      text-decoration: none;
      width: 100%;
    }

    .nav-buttons button {
      width: 100%;

      background: rgba(255,255,255,0.03);

      border: 1px solid rgba(0,255,200,0.18);
      border-radius: 14px;

      color: #b8e7f2;

      padding: 15px;

      font-size: 0.92rem;
      font-weight: 600;

      /* reduced spacing */
      letter-spacing: 1px;

      font-family: 'Inter', sans-serif;

      cursor: pointer;

      transition: all 0.25s ease;
    }

    .nav-buttons button:hover {
      background: rgba(0,255,200,0.08);

      color: #ffffff;

      transform: translateX(5px);

      box-shadow:
        0 0 15px rgba(0,255,200,0.15);
    }

    /* Main content area */
    .main {
      flex: 1;

      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;
      z-index: 1;
    }

    /* Futuristic ring */
    .ring {
      position: absolute;

      width: 500px;
      height: 500px;

      border-radius: 50%;
      border: 2px solid rgba(0,255,200,0.12);

      box-shadow:
        0 0 30px rgba(0,255,200,0.15),
        inset 0 0 30px rgba(0,255,200,0.08);

      z-index: 0;
    }

    /* Center content box */
    .content {
      position: relative;
      z-index: 2;

      padding: 50px;

      background: rgba(255,255,255,0.03);

      border: 1px solid rgba(0,255,200,0.12);
      border-radius: 20px;

      backdrop-filter: blur(6px);

      text-align: center;

      box-shadow:
        0 0 25px rgba(0,255,200,0.08);
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;

      /* MUCH easier to read */
      letter-spacing: 4px;

      margin-bottom: 20px;

      color: #e6ffff;

      text-shadow:
        0 0 8px rgba(0,255,200,0.35),
        0 0 18px rgba(0,255,200,0.18);
    }

    h2 {
      font-size: 1.05rem;
      font-weight: 500;

      letter-spacing: 1.5px;
      text-transform: uppercase;

      line-height: 1.9;

      color: #9fd0dc;
    }

    /* Mobile */
    @media (max-width: 768px) {

      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;

        padding: 20px;
      }

      .nav-buttons {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .nav-buttons button {
        width: 100%;
      }

      .main {
        padding: 20px;
      }

      .content {
        width: 95%;
      }

      h1 {
        font-size: 2.5rem;
        letter-spacing: 2px;
      }

      h2 {
        font-size: 0.85rem;
        letter-spacing: 1px;
      }

      .ring {
        width: 300px;
        height: 300px;
      }
    }

  </style>
</head>

<body>

  <div class="grid"></div>

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="logo">ORLD 5050</div>

    <div class="nav-buttons">

      <a href="index.html">
        <button>HOME</button>
      </a>

      <a href="lecture.html">
        <button>LECTURE 1</button>
      </a>

      <a href="lecture2.html">
        <button>READINGS</button>
      </a>

      <a href="#">
        <button>PROJECTS</button>
      </a>

      <a href="#">
        <button>CONTACT</button>
      </a>

    </div>

  </aside>

  <!-- Main -->
  <main class="main">

    <div class="ring"></div>

    <div class="content">

      <h1>ORLD 5050</h1>

      <h2>
        Ethical Evidence-Based<br>
        Decision-Making
      </h2>

    </div>

  </main>

</body>
</html>
