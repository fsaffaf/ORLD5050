<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ethical Evidence-Based Decision Making</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ========================================
       Animated Background
  ========================================= -->

  <div class="background">

    <div class="grid-overlay"></div>

    <div class="network">

      <!-- Nodes -->
      <div class="node" style="top:20%; left:15%;"></div>
      <div class="node" style="top:35%; left:40%;"></div>
      <div class="node" style="top:60%; left:30%;"></div>
      <div class="node" style="top:50%; left:70%;"></div>
      <div class="node" style="top:75%; left:55%;"></div>

      <!-- Connection Lines -->
      <div class="line"
           style="top:20%; left:15%; width:280px; transform:rotate(18deg);">
      </div>

      <div class="line"
           style="top:35%; left:40%; width:220px; transform:rotate(42deg);">
      </div>

      <div class="line"
           style="top:60%; left:30%; width:340px; transform:rotate(-12deg);">
      </div>

      <!-- Moving Evidence Pulses -->
      <div class="pulse"
           style="top:34%; left:40%; animation-duration:8s;">
      </div>

      <div class="pulse"
           style="top:60%; left:30%; animation-duration:10s;">
      </div>

    </div>
  </div>

  <!-- ========================================
       Navigation
  ========================================= -->

  <header class="top-nav">

    <nav>

      <button>Home</button>
      <button>Frameworks</button>
      <button>Research</button>
      <button>Case Studies</button>
      <button>Contact</button>

    </nav>

  </header>

  <!-- ========================================
       Hero Section
  ========================================= -->

  <main class="hero">

    <h1>
      Ethical Evidence-Based<br />
      Decision Making
    </h1>

    <p>
      Transparent reasoning, measurable outcomes,
      and accountable systems for complex decisions.
    </p>

  </main>

</body>
</html>
