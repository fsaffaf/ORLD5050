<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORLD 5050</title>

  <!-- Retro Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      color: white;

      /* Synthwave background */
      background:
        radial-gradient(circle at top, rgba(255,0,128,0.35), transparent 40%),
        linear-gradient(to bottom, #05010f 0%, #12001f 40%, #1a0033 70%, #000000 100%);
      position: relative;
    }

    /* Neon grid floor */
    body::before {
      content: "";
      position: absolute;
      bottom: -20%;
      left: -50%;
      width: 200%;
      height: 70%;
      background-image:
        linear-gradient(rgba(0,255,255,0.35) 2px, transparent 2px),
        linear-gradient(90deg, rgba(0,255,255,0.35) 2px, transparent 2px);

      background-size: 80px 80px;

      transform:
        perspective(500px)
        rotateX(75deg);

      animation: gridMove 10s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 0 80px;
      }
    }

    /* Sun glow */
    .sun {
      position: absolute;
      top: 18%;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #ff5fd2 0%, #ff0080 60%, transparent 75%);
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.8;
      z-index: 0;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    h1 {
      font-size: 5rem;
      letter-spacing: 8px;
      margin-bottom: 25px;

      color: #00ffff;

      text-shadow:
        0 0 5px #00ffff,
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #ff00ff,
        0 0 80px #ff00ff;
    }

    h2 {
      font-size: 1.5rem;
      color: #ff7be5;
      letter-spacing: 3px;

      text-shadow:
        0 0 5px #ff00ff,
        0 0 15px #ff00ff;
    }

    /* Glow pulse */
    h1, h2 {
      animation: glowPulse 3s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.03);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 3rem;
        letter-spacing: 4px;
      }

      h2 {
        font-size: 1rem;
      }

      .sun {
        width: 220px;
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <div class="sun"></div>

  <div class="content">
    <h1>ORLD 5050</h1>
    <h2>Ethical Evidence-Based Decision-Making</h2>
  </div>

</body>
</html>
