<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORLD 5050</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Orbitron', sans-serif;

      /* Softer synthwave gradient */
      background:
        radial-gradient(circle at top, rgba(255, 120, 180, 0.15), transparent 40%),
        linear-gradient(to bottom, #0a0f1f 0%, #131b33 45%, #1b1033 100%);

      color: #f4f4f4;
      position: relative;
    }

    /* Subtle stars */
    body::before {
      content: "";
      position: absolute;
      inset: 0;

      background-image:
        radial-gradient(white 1px, transparent 1px);

      background-size: 120px 120px;
      opacity: 0.15;
      z-index: 0;
    }

    /* Soft glowing sun */
    .sun {
      position: absolute;
      top: 14%;
      width: 260px;
      height: 260px;
      border-radius: 50%;

      background:
        radial-gradient(circle,
        rgba(255, 140, 200, 0.7) 0%,
        rgba(255, 100, 180, 0.35) 45%,
        transparent 75%);

      filter: blur(12px);
      z-index: 0;
    }

    /* Subtle grid */
    .grid {
      position: absolute;
      bottom: -20%;
      width: 200%;
      height: 45%;

      background-image:
        linear-gradient(rgba(120, 220, 255, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 220, 255, 0.12) 1px, transparent 1px);

      background-size: 70px 70px;

      transform:
        perspective(500px)
        rotateX(75deg);

      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 900px;
    }

    h1 {
      font-size: 4.2rem;
      letter-spacing: 6px;
      margin-bottom: 20px;

      color: #8fe9ff;

      text-shadow:
        0 0 8px rgba(143, 233, 255, 0.4);
    }

    h2 {
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 2px;
      line-height: 1.6;

      color: #ffd6f3;

      text-shadow:
        0 0 6px rgba(255, 214, 243, 0.25);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.7rem;
        letter-spacing: 3px;
      }

      h2 {
        font-size: 1rem;
      }

      .sun {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>

<body>

  <div class="sun"></div>
  <div class="grid"></div>

  <div class="content">
    <h1>ORLD 5050</h1>
    <h2>Ethical Evidence-Based Decision-Making</h2>
  </div>

</body>
</html>
