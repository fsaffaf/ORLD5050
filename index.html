<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ethical Evidence-Based Decision Making</title>

  <link rel="stylesheet" href="styles.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- =========================
     BACKGROUND
========================= -->

<div class="background">

  <div class="grid"></div>

  <!-- Neural network diagram -->
  <svg class="nn" viewBox="0 0 1000 600" preserveAspectRatio="none">

    <!-- INPUT → HIDDEN -->
    <line x1="150" y1="120" x2="450" y2="100"></line>
    <line x1="150" y1="220" x2="450" y2="180"></line>
    <line x1="150" y1="320" x2="450" y2="260"></line>
    <line x1="150" y1="420" x2="450" y2="340"></line>

    <!-- HIDDEN → OUTPUT -->
    <line x1="450" y1="100" x2="800" y2="180"></line>
    <line x1="450" y1="180" x2="800" y2="260"></line>
    <line x1="450" y1="260" x2="800" y2="340"></line>
    <line x1="450" y1="340" x2="800" y2="420"></line>

    <!-- INPUT NODES -->
    <circle cx="150" cy="120" r="6"></circle>
    <circle cx="150" cy="220" r="6"></circle>
    <circle cx="150" cy="320" r="6"></circle>
    <circle cx="150" cy="420" r="6"></circle>

    <!-- HIDDEN NODES -->
    <circle cx="450" cy="100" r="6"></circle>
    <circle cx="450" cy="180" r="6"></circle>
    <circle cx="450" cy="260" r="6"></circle>
    <circle cx="450" cy="340" r="6"></circle>

    <!-- OUTPUT NODES -->
    <circle cx="800" cy="180" r="6"></circle>
    <circle cx="800" cy="260" r="6"></circle>
    <circle cx="800" cy="340" r="6"></circle>
    <circle cx="800" cy="420" r="6"></circle>

  </svg>

</div>

<!-- =========================
     NAVIGATION
========================= -->

<header class="top-nav">
  <nav>
    <button>Home</button>
    <button>Frameworks</button>
    <button>Research</button>
    <button>Case Studies</button>
    <button>Contact</button>
  </nav>
</header>

<!-- =========================
     HERO
========================= -->

<main class="hero">

  <h1>
    Ethical Evidence-Based<br/>
    Decision Making
  </h1>

  <p>
    Transparent reasoning, measurable outcomes,
    and accountable systems for complex decisions.
  </p>

</main>

</body>
</html>
