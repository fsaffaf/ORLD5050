<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ORLD 5050: Ethical Evidence-Based Decision-Making</title>


<style>
  html, body {
    height: 100%;
    margin: 0;
  }


  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
  }


  .background-decor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1), transparent 40%);
    z-index: 0;
  }


  .container {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    text-align: center;
    max-width: 500px;
    width: 100%;
    backdrop-filter: blur(6px);
  }


  h1 {
    margin-bottom: 10px;
  }

  p {
    color: #666;
    font-style: italic;
    margin-bottom: 25px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }


  .grid button:last-child {
    grid-column: span 2;
  }

  button {
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }
</style>
</head>

<body>

<div class="background-decor"></div>


<div class="container">
  <h1>ORLD 5050: Ethical Evidence-Based Decision-Making</h1>
  <p>Soft graphs, matrices, probability curves, and dashboards</p>

  <div class="grid">
    <button>Graphs</button>
    <button>Matrices</button>
    <button>Probability</button>
    <button>Dashboards</button>
    <button>Curves</button>
  </div>
</div>

</body>
