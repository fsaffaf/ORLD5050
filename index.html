<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORLD 5050</title>

  <!-- Futuristic Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Orbitron', sans-serif;

      /* Dark futuristic background */
      background:
        radial-gradient(circle at top, rgba(0, 255, 200, 0.08), transparent 35%),
        linear-gradient(to bottom, #05070d 0%, #0b1220 45%, #020305 100%);

      color: white;
      position: relative;
    }

    /* Digital grid */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 200, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 200, 0.05) 1px, transparent 1px);

      background-size: 60px 60px;
      z-index: 0;
    }

    /* Glow ring */
    .ring {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 2px solid rgba(0, 255, 200, 0.12);

      box-shadow:
        0 0 30px rgba(0, 255, 200, 0.15),
        inset 0 0 30px rgba(0, 255, 200, 0.08);

      z-index: 0;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 2;
      padding: 40px;
      backdrop-filter: blur(6px);

      background: rgba(255,255,255,0.03);

      border: 1px solid rgba(0,255,200,0.12);
      border-radius: 18px;

      box-shadow:
        0 0 25px rgba(0,255,200,0.08);
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: 10px;
      margin-bottom: 25px;

      color: #c8ffff;

      text-shadow:
        0 0 8px rgba(0,255,200,0.5),
        0 0 18px rgba(0,255,200,0.25);
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;

      color: #8abdcf;

      text-shadow:
        0 0 10px rgba(0,255,200,0.18);

      line-height: 1.8;
    }

    /* Subtle scanning line animation */
    .scan {
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 200%;

      background:
        linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0,255,200,0.05) 50%,
          transparent 100%
        );

      animation: scanMove 8s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes scanMove {
      from {
        transform: translateY(-50%);
      }

      to {
        transform: translateY(50%);
      }
    }

    @media (max-width: 768px) {

      .content {
        width: 90%;
        padding: 25px;
      }

      h1 {
        font-size: 2.6rem;
        letter-spacing: 5px;
      }

      h2 {
        font-size: 0.9rem;
        letter-spacing: 2px;
      }

      .ring {
        width: 300px;
        height: 300px;
      }
    }
  </style>
</head>

<body>

  <div class="grid"></div>
  <div class="ring"></div>

  <div class="content">
    <div class="scan"></div>

    <h1>ORLD 5050</h1>

    <h2>
      Ethical Evidence-Based<br>
      Decision-Making
    </h2>
  </div>

</body>
</html>
